name: Update GitHub Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  generate-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: 'username=isabellamarques1824&show_icons=true&include_all_commits=true&hide_border=false&border_radius=4.5&bg_color=0d1117&border_color=2c3237&title_color=c8cdd1&text_color=b3bac0&icon_color=a7b0b7'
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: 'username=isabellamarques1824&layout=compact&langs_count=8&hide_border=false&border_radius=4.5&bg_color=0d1117&border_color=2c3237&title_color=c8cdd1&text_color=b3bac0'
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit generated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/stats.svg profile/top-langs.svg
          git commit -m "Update GitHub stats" || exit 0
          git push
